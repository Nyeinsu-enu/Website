<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animal Fun World</title>
<link rel="stylesheet" href="menu.css">
</head>
<body>


<!-- ===== MENU ===== -->
<div class="menu-container">
    <h1 class="title">🐾 Animal Fun World 🐾</h1>
    <p class="subtitle">Choose Your Game!</p>
    <div class="game-grid">
        <div class="game-card" onclick="goToBlitz()">
            <h2>🧩 Animal Blitz</h2>
            <p>Match 3 Puzzle Game</p>
        </div>
        <div class="game-card" onclick="goToMemory()">
            <h2>🧠 Animal Memory</h2>
            <p>Flip & Match Cards</p>
        </div>
        <div class="game-card" onclick="goToDash()">
            <h2>🏃 Animal Dash</h2>
            <p>Endless Runner Style</p>
        </div>
    </div>
    <div class="bottom-bar">
        <button onclick="toggleMusic()">🎵 Music Off</button>
        <button onclick="toggleTheme()">🌙 Theme</button>
    </div>
</div>

<script src="menu.js"></script>
</body>
</html>
